<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Malware Detection</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    display: flex;
    justify-content: center;
    align-items: center;
    color: white;
}

.container {
    width: 420px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 30px;
    box-shadow: 0 15px 40px rgba(0,0,0,0.4);
    animation: slideUp 0.8s ease;
}

h1 {
    text-align: center;
    margin-bottom: 20px;
    font-weight: 600;
}

.subtitle {
    text-align: center;
    font-size: 14px;
    opacity: 0.7;
    margin-bottom: 25px;
}

.input-group {
    margin-bottom: 15px;
}

.input-group label {
    font-size: 13px;
    opacity: 0.8;
}

.input-group input {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
    transition: 0.3s;
}

.input-group input:focus {
    background: rgba(255,255,255,0.2);
    box-shadow: 0 0 8px rgba(255,255,255,0.3);
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.05);
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
}

.result {
    margin-top: 20px;
    padding: 12px;
    border-radius: 12px;
    text-align: center;
    font-weight: bold;
    animation: fadeIn 0.5s ease;
}

.safe {
    background: rgba(0, 255, 100, 0.2);
    color: #00ff88;
}

.danger {
    background: rgba(255, 50, 50, 0.2);
    color: #ff4d4d;
}

.loader {
    display: none;
    margin-top: 15px;
    text-align: center;
}

.loader span {
    display: inline-block;
    width: 10px;
    height: 10px;
    background: white;
    margin: 3px;
    border-radius: 50%;
    animation: bounce 0.6s infinite alternate;
}

.loader span:nth-child(2) { animation-delay: 0.2s; }
.loader span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { transform: translateY(-8px); opacity: 0.5; }
}

@keyframes slideUp {
    from { transform: translateY(50px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

<script>
function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</head>

<body>

<div class="container">
    <h1>🛡️ AI Malware Detection</h1>
    <div class="subtitle">Smart Ransomware Detection System</div>

    <form method="POST" onsubmit="showLoader()">

        <div class="input-group">
            <label>File Size</label>
            <input type="number" name="file_size" required>
        </div>

        <div class="input-group">
            <label>Entropy</label>
            <input type="number" step="any" name="entropy" required>
        </div>

        <div class="input-group">
            <label>CPU Usage</label>
            <input type="number" name="cpu_usage" required>
        </div>

        <div class="input-group">
            <label>File Changes</label>
            <input type="number" name="file_changes" required>
        </div>

        <div class="input-group">
            <label>Network Activity</label>
            <input type="number" name="network_activity" required>
        </div>

        <button type="submit">🚀 Analyze File</button>

    </form>

    <!-- Loader -->
    <div class="loader" id="loader">
        <span></span><span></span><span></span>
    </div>

    {% if result %}
        <div class="result {% if 'Safe' in result %}safe{% else %}danger{% endif %}">
            {{ result }}
        </div>
    {% endif %}

</div>

</body>
</html>
